<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Images</title>
</head>
<body>
    <h1>Uploaded Images</h1>
    {% if images %}
        <ul>
        {% for image in images %}
            <li>
                <img src="{{ url_for('static', filename='captured_images/' + image) }}" alt="{{ image }}" width="200">
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>No images uploaded yet.</p>
    {% endif %}
    <a href="/">Về trang upload</a>
</body>
</html>
